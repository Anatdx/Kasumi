name: Build LKM for HymoFS

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - lkm

jobs:
  build-lkm:
    strategy:
      fail-fast: false
      matrix:
        kmi:
          - android12-5.10
          - android13-5.10
          - android13-5.15
          - android14-5.15
          - android14-6.1
          - android15-6.6
          - android16-6.12
    uses: ./.github/workflows/ddk-lkm.yml
    secrets: inherit
    with:
      kmi: ${{ matrix.kmi }}
      ddk_release: "20251104"

  merge-lkm:
    name: Merge all LKM artifacts
    needs: build-lkm
    runs-on: ubuntu-latest
    steps:
      - name: Download all LKM artifacts
        uses: actions/download-artifact@v4

      - name: Merge into lkm folder
        run: |
          mkdir -p lkm
          find . -name "*.ko" -path "*hymofs_lkm*" -exec cp {} lkm/ \;
          ls -la lkm/

      - name: Upload combined LKM artifact
        uses: actions/upload-artifact@v4
        with:
          name: hymofs-lkm-all
          path: lkm/

      - name: Create zip archive
        run: |
          zip -r hymofs-lkm.zip lkm/
          ls -la hymofs-lkm.zip

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: hymofs-lkm-zip
          path: hymofs-lkm.zip

  post-lkm-tg:
    name: Post LKM zip to Telegram
    needs: merge-lkm
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (for scripts)
        uses: actions/checkout@v4
        with:
          sparse-checkout: scripts

      - name: Download LKM zip
        uses: actions/download-artifact@v4
        with:
          name: hymofs-lkm-zip

      - name: Post zip to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE_THREAD_ID: ${{ secrets.KPM_MESSAGE_THREAD_ID }}
          SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TITLE: "HymoFS LKM (all KMI)"
          VERSION: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "BOT_TOKEN/CHAT_ID not set, skipping."
            exit 0
          fi
          pip install telethon==1.34.0
          if [ -f "hymofs-lkm.zip" ]; then
            python3 scripts/hymobot.py hymofs-lkm.zip
          else
            echo "No zip to upload"
          fi

  trigger-hymo:
    name: Trigger hymo build-lkm
    needs: merge-lkm
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      # 使用 workflow_dispatch API 显式触发 build.yml，并传入 HymoFS 的 commit 信息供 TG 详情展示
      - name: Trigger hymo repository_dispatch
        env:
          HYMO_REPO: Anatdx/hymo
          HYMO_TRIGGER_TOKEN: ${{ secrets.HYMO_TRIGGER_TOKEN }}
          HYMOFS_REF: ${{ github.ref_name }}
          HYMO_REF: ${{ github.ref_name }}
          HYMOFS_SHA: ${{ github.sha }}
          HYMOFS_MSG: ${{ github.event.head_commit.message }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          if [ -z "$HYMO_TRIGGER_TOKEN" ]; then
            echo "HYMO_TRIGGER_TOKEN not set, skip triggering hymo."
            exit 0
          fi
          echo "Triggering $HYMO_REPO repository_dispatch build-lkm (hymofs ref=$HYMOFS_REF, sha=$HYMOFS_SHA)"
          payload=$(jq -n \
            --arg ref "$HYMO_REF" \
            --arg ref_name "$HYMOFS_REF" \
            --arg sha "$HYMOFS_SHA" \
            --arg msg "$HYMOFS_MSG" \
            --arg run_id "${GITHUB_RUN_ID}" \
            '{event_type: "build-lkm", client_payload: {ref: $ref, hymofs_ref: $ref_name, hymofs_sha: $sha, hymofs_commit_message: $msg, hymofs_run_id: $run_id}}')
          resp=$(curl -sS -w "\n%{http_code}" -X POST "https://api.github.com/repos/${HYMO_REPO}/dispatches" \
            -H "Authorization: token ${HYMO_TRIGGER_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d "$payload")
          code=$(echo "$resp" | tail -n1)
          echo "Response: HTTP $code"
          if [ "$code" != "204" ]; then
            echo "::error::Trigger failed"
            echo "$resp" | sed '$d'
            exit 1
          fi
          echo "Trigger sent. Check Actions in $HYMO_REPO."
